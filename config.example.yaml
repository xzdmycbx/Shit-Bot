# ─── Users (no-groups mode) ───────────────────────────────────────────────────
# When no groups are defined, all tweets go to the top-level Discord/Telegram.
users:
  - username: elonmusk
    displayName: Elon Musk
    filters:
      keywords:
        include:
          - tesla
          - spacex
        exclude:
          - ad
          - sponsored
      media:
        requireMedia: false
      excludeRetweets: true
      excludeReplies: false

# ─── Top-level platform config ────────────────────────────────────────────────
# Used when no groups are defined.
discord:
  enabled: false
  token: YOUR_DISCORD_BOT_TOKEN
  channelId: YOUR_CHANNEL_ID
  adminChannelId: YOUR_ADMIN_CHANNEL_ID
  embedColor: "#1DA1F2"

telegram:
  enabled: true
  token: YOUR_TELEGRAM_BOT_TOKEN
  chatId: "-1001234567890"
  adminChatIds:
    - "111111111"
  targets:
    r14:
      chatId: "-100_R14_CHAT_ID"
  parseMode: HTML
  apiRoot: ""

twitter:
  authToken: ""
  ct0: ""
  username: ""
  password: ""
  email: ""
  totpSecret: ""

webui:
  enabled: true
  port: 3000
  host: "0.0.0.0"
  password: ""

enableApproval: true
sendAsImage: true
xToImageApiUrl: ""
xToImageApiToken: ""
xToImageApiTheme: dark
imageCacheTtlMinutes: 60
pollIntervalMinutes: 5
maxPostsPerFetch: 20
maxTweetAgeMinutes: 60

# ─── Groups mode (optional) ───────────────────────────────────────────────────
