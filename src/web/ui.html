<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ShitBot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=DM+Sans:opsz,wght@9..40,400..500;9..40,600;9..40,700&display=swap');

  :root {
    --bg: #080b12;
    --bg-card: #0d1117;
    --bg-sidebar: #0a0e15;
    --bg-input: #111823;
    --bg-hover: #131b27;
    --border: #1a2333;
    --border-active: #2a3d5c;
    --text: #8899b4;
    --text-dim: #55667a;
    --text-bright: #cdd9e9;
    --accent: #4499ff;
    --accent-soft: rgba(68,153,255,0.08);
    --accent-glow: rgba(68,153,255,0.25);
    --green: #00e676;
    --green-soft: rgba(0,230,118,0.08);
    --green-glow: rgba(0,230,118,0.2);
    --red: #ff4d6a;
    --red-soft: rgba(255,77,106,0.08);
    --amber: #ffab00;
    --amber-soft: rgba(255,171,0,0.08);
    --purple: #b388ff;
    --cyan: #00e5ff;
    --radius: 6px;
    --radius-sm: 4px;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.5);
    --transition: 160ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  :root[data-theme="dark"] {
    --bg: #080b12;
    --bg-card: #0d1117;
    --bg-sidebar: #0a0e15;
    --bg-input: #111823;
    --bg-hover: #131b27;
    --border: #1a2333;
    --border-active: #2a3d5c;
    --text: #8899b4;
    --text-dim: #55667a;
    --text-bright: #cdd9e9;
    --accent: #4499ff;
    --accent-soft: rgba(68,153,255,0.08);
    --accent-glow: rgba(68,153,255,0.25);
    --green: #00e676;
    --green-soft: rgba(0,230,118,0.08);
    --green-glow: rgba(0,230,118,0.2);
    --red: #ff4d6a;
    --red-soft: rgba(255,77,106,0.08);
    --amber: #ffab00;
    --amber-soft: rgba(255,171,0,0.08);
    --purple: #b388ff;
    --cyan: #00e5ff;
    --radius: 6px;
    --radius-sm: 4px;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.5);
    --transition: 160ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(68,153,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse at 80% 100%, rgba(0,230,118,0.03) 0%, transparent 50%);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.008) 0px, rgba(255,255,255,0.008) 1px, transparent 1px, transparent 3px);
    opacity: 0.6;
  }

  .app { max-width: 1060px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Header ────────────────────── */

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 0 18px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .theme-toggle {
    min-width: 34px; height: 34px;
    padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--text-dim);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    font-family: var(--font-mono);
    white-space: nowrap;
    letter-spacing: -0.3px;
  }

  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: #fff;
    animation: logoPulse 3s ease-in-out infinite;
  }

  @keyframes logoPulse { 0%,100%{box-shadow: 0 0 8px var(--accent-glow)} 50%{box-shadow: 0 0 20px var(--accent-glow)} }

  .logo h1 {
    font-family: var(--font-mono);
    font-size: 18px; font-weight: 700; color: var(--text-bright);
    letter-spacing: -0.5px;
  }

  .logo span {
    font-size: 10px; color: var(--text-dim);
    display: block; margin-top: -2px;
    font-family: var(--font-mono); letter-spacing: 1px; text-transform: uppercase;
  }

  .header-status {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    background: var(--green-soft);
    border: 1px solid rgba(0,230,118,0.15);
    border-radius: var(--radius-sm);
    font-size: 11px; font-weight: 600; color: var(--green);
    font-family: var(--font-mono);
  }

  .header-status::before {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: var(--green);
    box-shadow: 0 0 6px var(--green-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ── Stats ─────────────────────── */

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }

  .stat::after {
    content: '';
    position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--cyan), transparent 80%);
    opacity: 0.5;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: 26px; font-weight: 700;
    color: var(--text-bright);
    line-height: 1;
    letter-spacing: -1px;
  }

  .stat-label {
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px;
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px;
  }

  /* ── Layout ────────────────────── */

  .main-layout {
    display: grid;
    grid-template-columns: 176px 1fr;
    gap: 16px;
    align-items: start;
  }

  /* ── Sidebar ───────────────────── */

  .sidebar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
    position: sticky; top: 24px;
  }

  .sidebar-label {
    font-size: 9px; font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 8px 10px 4px;
    margin-bottom: 2px;
    font-family: var(--font-mono);
  }

  .nav-item {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    padding: 8px 10px;
    border: none; background: none;
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-family: var(--font-body); font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }

  .nav-item:hover {
    color: var(--text);
    background: var(--bg-hover);
  }

  .nav-item.active {
    color: var(--text-bright);
    background: var(--accent-soft);
    box-shadow: inset 0 0 0 1px rgba(68,153,255,0.2);
    font-weight: 600;
  }

  .nav-item.active::before {
    content: '';
    position: absolute; left: -6px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 60%;
    background: var(--accent);
    border-radius: 1px;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .nav-dot {
    width: 5px; height: 5px;
    border-radius: 50%; background: var(--border);
    transition: all var(--transition);
  }

  .nav-item.active .nav-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }

  .nav-item .nav-badge {
    margin-left: auto;
    font-size: 10px; font-weight: 700;
    padding: 1px 7px;
    border-radius: 3px;
    background: var(--accent-soft); color: var(--accent);
    font-family: var(--font-mono);
    letter-spacing: -0.3px;
  }

  /* ── Panel ─────────────────────── */

  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-head {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text-bright);
    font-family: var(--font-mono); letter-spacing: 0.3px;
    background: linear-gradient(180deg, rgba(68,153,255,0.02) 0%, transparent 100%);
  }

  .panel-head-icon { font-size: 14px; }

  .panel-body { padding: 20px; }

  .tab-content { display: none; animation: fadeIn 0.2s ease; }
  .tab-content.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } }

  /* ── Forms ─────────────────────── */

  .field { margin-bottom: 16px; }

  .field label {
    display: block; font-size: 10px; font-weight: 600;
    color: var(--text-dim); margin-bottom: 5px;
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.8px;
  }

  .field input, .field select {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-bright);
    font-family: var(--font-body); font-size: 13px;
    outline: none;
    transition: all var(--transition);
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft), 0 0 12px var(--accent-glow);
    background: var(--bg-card);
  }

  .field input::placeholder { color: var(--text-dim); }

  .field select {
    -webkit-appearance: none;
    background: var(--bg-input) url("data:image/svg+xml,%3Csvg width='12' height='8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5l5 5 5-5' stroke='%2355667a' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 12px center;
  }

  .field select:focus { background-color: var(--bg-card); }

  .field-inline { display: flex; align-items: center; gap: 8px; }
  .field-inline label { margin-bottom: 0; font-size: 12px; color: var(--text); cursor: pointer; font-family: var(--font-body); text-transform: none; letter-spacing: 0; }

  .field input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer; flex-shrink: 0;
  }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  .field-hint {
    font-size: 10px; color: var(--text-dim);
    margin-top: 3px;
  }

  /* ── Chips ─────────────────────── */

  .chip-array {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 6px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    min-height: 34px; align-items: flex-start;
    transition: border-color var(--transition);
  }

  .chip-array:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft), 0 0 12px var(--accent-glow);
  }

  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 11px; color: var(--text);
    font-weight: 500;
    font-family: var(--font-mono);
    transition: all var(--transition);
  }

  .chip:hover { border-color: var(--accent); }

  .chip .rm {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 2px;
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer; font-size: 12px; line-height: 1;
    transition: all var(--transition);
  }

  .chip .rm:hover { background: var(--red); color: #fff; }

  .chip-array input {
    border: none; background: none; outline: none;
    color: var(--text); font-family: var(--font-mono); font-size: 11px;
    min-width: 80px; flex: 1;
  }

  .chip-array input::placeholder { color: var(--text-dim); }

  .chip.user-chip {
    border-color: rgba(68,153,255,0.25); background: var(--accent-soft);
    color: var(--accent);
  }

  /* ── Buttons ───────────────────── */

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--text);
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
  }

  .btn:hover { background: var(--bg-hover); border-color: var(--border-active); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #3a85e0;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .btn-danger {
    background: var(--bg-card);
    border-color: rgba(255,77,106,0.2);
    color: var(--red);
  }

  .btn-danger:hover { background: var(--red-soft); border-color: var(--red); }

  .btn-ghost {
    background: none; border: none; color: var(--text-dim);
    padding: 5px 8px; font-size: 11px;
  }

  .btn-ghost:hover { color: var(--text); background: var(--bg-hover); }

  .btn-sm { padding: 4px 12px; font-size: 11px; }
  .btn-xs { padding: 2px 8px; font-size: 10px; border-radius: 3px; font-family: var(--font-mono); }

  .btn-group { display: flex; gap: 8px; margin-top: 14px; }

  /* ── Users grid ─────────────────── */

  .users-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .users-section-title {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 18px 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }

  .users-section-title:first-child { margin-top: 0; }

  .users-section-title .section-badge {
    font-size: 9px; padding: 2px 6px; border-radius: 2px;
    border: 1px solid var(--border);
    font-weight: 600;
  }

  .user-card-grid {
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }

  .user-card-grid:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }

  .user-card-grid::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity var(--transition);
  }

  .user-card-grid:hover::before { opacity: 0.6; }

  .uc-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
  }

  .uc-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid var(--border);
  }

  .uc-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .uc-names { flex: 1; min-width: 0; }

  .uc-name {
    font-weight: 600; color: var(--text-bright); font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .uc-handle {
    font-size: 11px; color: var(--accent);
    font-family: var(--font-mono);
  }

  .uc-groups {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 6px;
  }

  .uc-group-tag {
    font-size: 9px; font-weight: 700;
    padding: 1px 6px; border-radius: 2px;
    font-family: var(--font-mono);
    letter-spacing: -0.2px;
    border: 1px solid;
  }

  .uc-group-tag.g0 { color: var(--accent); border-color: rgba(68,153,255,0.3); background: var(--accent-soft); }
  .uc-group-tag.g1 { color: var(--green); border-color: rgba(0,230,118,0.3); background: var(--green-soft); }
  .uc-group-tag.g2 { color: var(--purple); border-color: rgba(179,136,255,0.3); background: rgba(179,136,255,0.08); }
  .uc-group-tag.g3 { color: var(--amber); border-color: rgba(255,171,0,0.3); background: var(--amber-soft); }

  .uc-tags {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 8px;
  }

  .ftag {
    font-size: 10px; font-weight: 500;
    padding: 2px 7px;
    border-radius: 3px;
    font-family: var(--font-mono);
    letter-spacing: -0.2px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: var(--bg-card);
  }

  .ftag.on { color: var(--green); background: var(--green-soft); border-color: rgba(0,230,118,0.2); }
  .ftag.off { color: var(--red); background: var(--red-soft); border-color: rgba(255,77,106,0.2); }

  /* ── Cards ─────────────────────── */
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  .card-title {
    font-size: 10px; font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
  }

  /* ── Group cards ────────────────── */

  .group-list { display: flex; flex-direction: column; gap: 12px; }

  .group-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all var(--transition);
  }

  .group-card:hover { border-color: var(--border-active); }

  .group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: var(--bg-sidebar);
    cursor: pointer;
    user-select: none;
    transition: var(--transition);
  }

  .group-header:hover { background: var(--bg-hover); }

  .group-name {
    font-weight: 700; font-size: 14px; color: var(--text-bright);
    display: flex; align-items: center; gap: 8px;
  }

  .group-name .group-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .group-meta {
    display: flex; align-items: center; gap: 12px;
    font-size: 10px; color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .group-body {
    padding: 16px 18px;
    display: none;
  }

  .group-body.open { display: block; animation: fadeIn 0.15s ease; }

  .group-section {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .group-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  .group-section-title {
    font-size: 10px; font-weight: 700;
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ── Empty State ───────────────── */

  .empty {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
  }

  .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }

  .empty p { font-size: 12px; font-family: var(--font-mono); }

  /* ── Table ─────────────────────── */

  .data-table { width: 100%; border-collapse: collapse; }

  .data-table th {
    text-align: left; padding: 8px 12px;
    font-size: 10px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
  }

  .data-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text);
  }

  .data-table tr:hover td { background: var(--bg-sidebar); }

  .col-content { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Toast ─────────────────────── */

  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;

  @keyframes toastIn { from { opacity: 0; transform: translateY(6px); } }

  /* ── Login ─────────────────────── */

  .login-overlay {

function t(key, ...args) {
  let msg = (messages[lang] && messages[lang][key]) || (messages.en[key] || key);
  for (let i = 0; i < args.length; i++) msg = msg.replace('%' + (i + 1), args[i]);
  return msg;
}

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const storedPw = sessionStorage.getItem('password');
  if (storedPw) opts.headers['Authorization'] = 'Basic ' + btoa(':' + storedPw);
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(path, opts);
  if (resp.status === 401) {
    sessionStorage.removeItem('password');
    showLogin();
    throw new Error('Unauthorized');
  }
  return resp.json();
}

function showLogin() {
  const overlay = document.getElementById('login-overlay');
  if (overlay) overlay.style.display = 'flex';
  const app = document.querySelector('.app');
  if (app) app.style.display = 'none';
}

function hideLogin() {
  const overlay = document.getElementById('login-overlay');
  if (overlay) overlay.style.display = 'none';
  const app = document.querySelector('.app');
  if (app) app.style.display = '';
}

async function tryLogin() {
  const pw = document.getElementById('login-input')?.value.trim();
  if (!pw) return;
  const errEl = document.getElementById('login-err');
  try {
    const resp = await fetch('/api/config', {
      headers: { 'Authorization': 'Basic ' + btoa(':' + pw), 'Content-Type': 'application/json' }
    });
    if (resp.status === 401) {
      if (errEl) errEl.textContent = 'Invalid password';
      return;
    }
    sessionStorage.setItem('password', pw);
    hideLogin();
    await loadConfig();
  } catch (e) {
    if (errEl) errEl.textContent = 'Connection failed';
  }
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  $('#toast-container').appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

async function loadConfig() {
  try { config = await api('/api/config'); render(); }
  catch(e) { toast(t('loadFailed') + e.message, 'error'); }
}

async function saveFullConfig(patch) {
  try {
    await api('/api/config', 'PUT', patch);
    toast(t('configSaved'));
    await loadConfig();
  } catch(e) { toast(t('saveFailed') + e.message, 'error'); }
}

/* ── Helpers ────────────────────── */

function fldHTML(label, key, val, opts = {}) {
  const { type = 'text', placeholder = '', isSecret = false, hint = '' } = opts;
  const id = 'fld_' + key.replace(/\./g, '_');
  const displayVal = isSecret && val === '••••••••' ? '' : (val || '');
  const inputType = isSecret ? 'password' : type;

  let h = '<div class="field"><label>' + label + '</label>';
  if (type === 'checkbox') {
    h += '<div class="field-inline">';
    h += '<input type="checkbox" id="' + id + '" ' + (val ? 'checked' : '') + '>';
    h += '<label for="' + id + '">' + (placeholder || 'Enabled') + '</label>';
    h += '</div>';
  } else if (type === 'select') {
    h += '<select id="' + id + '">';
    for (const o of (opts.options || []))
      h += '<option value="' + o + '"' + (val === o ? ' selected' : '') + '>' + o + '</option>';
    h += '</select>';
  } else {
    h += '<input type="' + inputType + '" id="' + id + '" value="' + displayVal + '" placeholder="' + placeholder + '">';
  }
  if (hint) h += '<div class="field-hint">' + hint + '</div>';
  h += '</div>';
  return h;
}

function getFld(key) {
  const el = document.getElementById('fld_' + key.replace(/\./g, '_'));
  if (!el) return undefined;
  if (el.type === 'checkbox') return el.checked;
  return el.value;
}

function chipHTML(text) {
  return '<span class="chip">' + text + '<span class="rm" onclick="this.parentElement.remove()">×</span></span>';
}

function addChip(e, input, containerId) {
  if (e.key === 'Enter' && input.value.trim()) {
    e.preventDefault();
    const c = document.getElementById(containerId);
    const span = document.createElement('span');
    span.className = 'chip';
    span.innerHTML = input.value.trim() + '<span class="rm" onclick="this.parentElement.remove()">×</span>';
    c.insertBefore(span, input);
    input.value = '';
  }
}

function getChips(id) {
  const c = document.getElementById(id);
  if (!c) return [];
  return Array.from(c.querySelectorAll('.chip')).map(ch => ch.childNodes[0].textContent.trim()).filter(Boolean);
}

/* ── Stats ──────────────────────── */

function renderStats() {
  const groups = config.groups || [];
  const userSet = new Set();
  groups.forEach(g => (g.users || []).forEach(u => userSet.add(u.username)));
  const u = userSet.size;
  const d = config.discord.enabled ? t('on') : t('off');
  const tg = config.telegram.enabled ? t('on') : t('off');
  const p = config.pollIntervalMinutes + t('minUnit');
  $('#stats').innerHTML =
    '<div class="stat"><div class="stat-value">' + u + '</div><div class="stat-label">' + t('monitored') + '</div></div>' +
    '<div class="stat"><div class="stat-value">' + d + '</div><div class="stat-label">Discord</div></div>' +
    '<div class="stat"><div class="stat-value">' + tg + '</div><div class="stat-label">Telegram</div></div>' +
    '<div class="stat"><div class="stat-value">' + p + '</div><div class="stat-label">' + t('interval') + '</div></div>';
  const badge = document.getElementById('nav-user-count');
  if (badge) badge.textContent = u;
}

/* ── Users ──────────────────────── */

function avatarHTML(username, displayName) {
  const name = displayName || username || '?';
  const ch = name[0].toUpperCase();
  return '<div class="user-avatar">' +
    '<img src="https://unavatar.io/twitter/' + username + '" alt=""' +
    ' onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + ch + '\'"' +
    ' loading="lazy">' +
    '</div>';
}

function renderUsers() {
  const groups = config.groups || [];
  const userMap = new Map();

  groups.forEach(g => {
    (g.users || []).forEach(u => {
      if (!userMap.has(u.username)) {
        userMap.set(u.username, { ...u, groups: [] });
      }
      userMap.get(u.username).groups.push(g.name);
    });
  });

  const users = Array.from(userMap.values());

  if (!users.length) {
    $('#tab-users').innerHTML = '<div class="empty"><div class="empty-icon">◈</div><p>' + t('noUsers') + '</p></div>';
    return;
  }

  const groupColors = {};
  groups.forEach((g, i) => { groupColors[g.name] = 'g' + (i % 4); });

  let h = '<p style="color:var(--text-dim);margin-bottom:14px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px">' + t('usersInGroups') + '</p>';
  h += '<div class="users-grid">';

  users.forEach(u => {
    const f = u.filters || {}, kw = f.keywords || {}, med = f.media || {};
    const uid = 'u_' + u.username.replace(/[^a-zA-Z0-9]/g, '_');
    h += '<div class="user-card-grid">';
    h += '<div class="uc-header">';
    h += '<div class="uc-avatar">' +
      '<img src="https://unavatar.io/twitter/' + u.username + '" alt=""' +
      ' onerror="this.style.display=\'none\'"' +
      ' loading="lazy">' +
      (u.displayName || u.username)[0].toUpperCase() +
      '</div>';
    h += '<div class="uc-names">';
    h += '<div class="uc-name">' + (u.displayName || u.username) + '</div>';
    h += '<div class="uc-handle">@' + u.username + '</div>';
    h += '</div></div>';

    h += '<div class="uc-groups">';
    u.groups.forEach(gname => {
      h += '<span class="uc-group-tag ' + (groupColors[gname] || 'g0') + '">' + gname + '</span>';
    });
    h += '</div>';

    h += '<div class="uc-tags">';
    if (kw.include && kw.include.length) h += '<span class="ftag on">+ ' + kw.include.join(', ') + '</span>';
    if (kw.exclude && kw.exclude.length) h += '<span class="ftag off">− ' + kw.exclude.join(', ') + '</span>';
    h += '<span class="ftag ' + (med.requireMedia ? 'on' : '') + '">' + (med.requireMedia ? t('mediaOnly') : t('anyPost')) + '</span>';
    h += '<span class="ftag ' + (f.excludeRetweets ? 'off' : '') + '">' + (f.excludeRetweets ? t('noRT') : t('withRT')) + '</span>';

/* ── User filters ────────────────── */

function toggleUserFilters(username) {
  const uid = 'u_' + username.replace(/[^a-zA-Z0-9]/g, '_');
  const el = document.getElementById(uid + '_box');
  if (el) {
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  } else {
    console.warn('Filter box not found for id:', uid + '_box');
  }
}

async function saveUserFilters(username) {
  const uid = 'u_' + username.replace(/[^a-zA-Z0-9]/g, '_');
  const filters = {
    keywords: {
      include: getChips(uid + '_inc'),
      exclude: getChips(uid + '_exc'),
    },
    media: { requireMedia: !!document.getElementById(uid + '_med')?.checked },
    excludeRetweets: !!document.getElementById(uid + '_rt')?.checked,
    excludeReplies: !!document.getElementById(uid + '_reply')?.checked,
  };

  const groups = config.groups || [];
  let updated = 0;

  for (const g of groups) {
    const users = g.users || [];
    const idx = users.findIndex(u => u.username === username);
    if (idx === -1) continue;

    const updatedUsers = users.map((u, i) => {
      if (i === idx) return { ...u, filters };
      return u;
    });

    await api('/api/groups/' + g.name, 'PUT', { users: updatedUsers });
    updated++;
  }

  if (updated > 0) {
    toast(t('updatedUser') + username);
    await loadConfig();
  } else {
    toast('User not found in any group', 'error');
  }
}

function renderCard(title, fields, saveKey) {

    General: 'btnSaveG', 'X to Image': 'btnSaveImg', 'Web UI': 'btnSaveW',

async function saveSection(section) {
  const fieldMap = {
    discord: ['discord.enabled', 'discord.token', 'discord.embedColor'],
    telegram: ['telegram.enabled', 'telegram.token', 'telegram.parseMode', 'telegram.apiRoot'],
    twitter: ['twitter.authToken', 'twitter.ct0', 'twitter.username', 'twitter.password', 'twitter.email', 'twitter.totpSecret'],
    settings: ['enableApproval', 'sendAsImage', 'xToImageApiUrl', 'xToImageApiToken', 'xToImageApiTheme', 'pollIntervalMinutes', 'maxPostsPerFetch', 'maxTweetAgeMinutes', 'imageCacheTtlMinutes', 'webui.port', 'webui.host', 'webui.password'],
  };

  const patch = {};
  const intKeys = ['pollIntervalMinutes','maxPostsPerFetch','maxTweetAgeMinutes','imageCacheTtlMinutes','port'];
  const boolKeys = ['enabled','enableApproval','sendAsImage'];

  for (const k of (fieldMap[section] || [])) {
    const val = getFld(k);
    if (val === undefined) continue;
    const parts = k.split('.');
    let obj = patch;
    for (let i = 0; i < parts.length - 1; i++) { if (!obj[parts[i]]) obj[parts[i]] = {}; obj = obj[parts[i]]; }
    const last = parts[parts.length - 1];
    if (boolKeys.includes(last)) obj[last] = document.getElementById('fld_' + k.replace(/\./g, '_')).checked;
    else if (intKeys.includes(last)) obj[last] = parseInt(val) || 0;
    else obj[last] = val;
  }

  await saveFullConfig(patch);
}

  await loadConfig();
}

async function saveGroup(gname) {
  const existingGroup = (config.groups || []).find(g => g.name === gname);
  const userNames = getChips('grp_users_' + gname);
  const telChatId = document.getElementById('grp_tg_' + gname)?.value?.trim() || '';
  const dcChanId = document.getElementById('grp_dc_' + gname)?.value?.trim() || '';
  const dcR14 = document.getElementById('grp_dcr14_' + gname)?.value?.trim() || '';
  const approvalTgAdminIds = getChips('grp_approval_tg_' + gname);
  const approvalDcChan = document.getElementById('grp_approval_dc_' + gname)?.value?.trim() || '';
  const approvalDcRole = document.getElementById('grp_approval_role_' + gname)?.value?.trim() || '';
  const blockedUsers = getChips('grp_blocked_' + gname);
  const targetsRaw = getChips('grp_targets_' + gname);
  const targets = {};
  targetsRaw.forEach(e => {
    const idx = e.indexOf(':');
    if (idx > 0) {
      const tag = e.substring(0, idx).trim();
      const chatId = e.substring(idx + 1).trim();
      if (tag && chatId) targets[tag] = { chatId };
    }
  });

  const group = {};
  if (userNames.length > 0) {
    const existingUsers = (existingGroup?.users || []);
    const existingMap = {};
    existingUsers.forEach(u => { existingMap[u.username] = u; });
    group.users = userNames.map(u => {
      const trimmed = u.trim();
      return existingMap[trimmed] || { username: trimmed, displayName: trimmed, filters: {} };
    });
  } else {
    group.users = [];
  }
  if (telChatId) group.telegram = { chatId: telChatId, targets: Object.keys(targets).length > 0 ? targets : undefined };
  else group.telegram = undefined;
  if (dcChanId || dcR14) group.discord = { channelId: dcChanId || '', r14ChannelId: dcR14 || '' };
  else group.discord = undefined;
  if (approvalTgAdminIds.length > 0 || approvalDcChan || approvalDcRole) {
    group.approval = {};
    if (approvalTgAdminIds.length > 0) group.approval.telegramAdminChatIds = approvalTgAdminIds;
    if (approvalDcChan) group.approval.discordAdminChannelId = approvalDcChan;
    if (approvalDcRole) group.approval.discordApproveRoleId = approvalDcRole;
  }
  if (blockedUsers.length > 0) group.blockedUsers = blockedUsers;

  await api('/api/groups/' + gname, 'PUT', group);
  toast(t('updatedGroup') + ' ' + gname);
  await loadConfig();
}

function switchTab(name) {
  $$('.nav-item').forEach(n => n.classList.remove('active'));

  $$('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name)?.classList.add('active');

function updateNavLabels() {
  $$('.nav-item').forEach(n => {
    const tab = n.dataset.tab;
    if (!tab || !tabLabels[tab]) return;
    const dot = n.querySelector('.nav-dot');
    const badge = n.querySelector('.nav-badge');
    n.textContent = t(tabLabels[tab]);
    if (dot) n.insertBefore(dot, n.firstChild);
    if (badge) n.appendChild(badge);
  });
  const badge = document.getElementById('nav-user-count');
  if (badge) {
    const groups = config?.groups || [];
    const s = new Set();
    groups.forEach(g => (g.users || []).forEach(u => s.add(u.username)));
    badge.textContent = s.size;
  }
  const sidebarLabel = document.querySelector('.sidebar-label');
  if (sidebarLabel) sidebarLabel.textContent = t('menu');
  const subtitle = document.querySelector('.logo span');
  if (subtitle) subtitle.textContent = t('twitterMonitor');
  const status = document.querySelector('.header-status');
  if (status) status.childNodes[1] ? status.childNodes[1].textContent = t('running') : null;
}

document.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('lang');
  if (savedLang && messages[savedLang]) lang = savedLang;
  else if (navigator.language.startsWith('zh')) lang = 'zh-CN';

  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  const toggle = document.getElementById('theme-toggle');
  if (toggle) {
    toggle.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '🌙' : '☀️';
    toggle.title = t('toggleTheme');
    toggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        toggle.textContent = '☀️';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      }
    });
  }

  updateLangButton();
  document.getElementById('lang-toggle')?.addEventListener('click', () => {
    lang = lang === 'zh-CN' ? 'en' : 'zh-CN';
    localStorage.setItem('lang', lang);
    updateLangButton();
    updateNavLabels();
    render();
    switchTab(document.querySelector('.nav-item.active')?.dataset.tab || 'users');
  });

  document.getElementById('login-btn')?.addEventListener('click', tryLogin);
  document.getElementById('login-input')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryLogin();
  });

  const storedPw = sessionStorage.getItem('password');
  if (!storedPw) {
    showLogin();
    document.getElementById('login-input')?.focus();
  } else {
    loadConfig().catch((e) => {
      if (e.message === 'Unauthorized') {
        document.getElementById('login-input')?.focus();
      }
    });
  }

  $$('.nav-item').forEach(n => n.addEventListener('click', () => switchTab(n.dataset.tab)));
});
</script>
</body>
</html>
